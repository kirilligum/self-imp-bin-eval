services:
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_USER: ${BIN_EVAL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${BIN_EVAL_POSTGRES_PASSWORD}
      POSTGRES_DB: ${BIN_EVAL_POSTGRES_DB}
    ports:
      - "127.0.0.1:${BIN_EVAL_POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BIN_EVAL_POSTGRES_USER} -d ${BIN_EVAL_POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.28.4
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${BIN_EVAL_POSTGRES_USER}
      POSTGRES_PWD: ${BIN_EVAL_POSTGRES_PASSWORD}
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
    ports:
      - "127.0.0.1:7233:7233"

  garage:
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    environment:
      GARAGE_CONFIG_FILE: /etc/garage.toml
      GARAGE_DEFAULT_ACCESS_KEY: ${BIN_EVAL_GARAGE_ACCESS_KEY}
      GARAGE_DEFAULT_SECRET_KEY: ${BIN_EVAL_GARAGE_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET: ${BIN_EVAL_ARTIFACT_BUCKET}
    ports:
      - "127.0.0.1:3900:3900"
      - "127.0.0.1:3901:3901"
      - "127.0.0.1:3902:3902"
      - "127.0.0.1:3903:3903"
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data

  api:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      garage:
        condition: service_started
    environment: &bin_eval_app_environment
      BIN_EVAL_ENV: ci
      BIN_EVAL_DATABASE_URL: postgres://bin_eval:bin_eval@postgres:5432/bin_eval?sslmode=disable
      BIN_EVAL_TEMPORAL_ADDRESS: temporal:7233
      BIN_EVAL_TEMPORAL_TASK_QUEUE: bin-eval-ci
      BIN_EVAL_GARAGE_ENDPOINT: http://garage:3900
      BIN_EVAL_GARAGE_ACCESS_KEY: ${BIN_EVAL_GARAGE_ACCESS_KEY}
      BIN_EVAL_GARAGE_SECRET_KEY: ${BIN_EVAL_GARAGE_SECRET_KEY}
      BIN_EVAL_ARTIFACT_BUCKET: ${BIN_EVAL_ARTIFACT_BUCKET}
      BIN_EVAL_LLM_BASE_URL: ${BIN_EVAL_LLM_BASE_URL}
      BIN_EVAL_LLM_API_KEY: ${BIN_EVAL_LLM_API_KEY}
      BIN_EVAL_MODEL_PROFILE: ${BIN_EVAL_MODEL_PROFILE:-gpt-5.4-mini}
      BIN_EVAL_MAX_EVALUATION_RUNS: ${BIN_EVAL_MAX_EVALUATION_RUNS:-5}
      BIN_EVAL_URL: http://api:8080
      BIN_EVAL_LISTEN_ADDR: 0.0.0.0:8080
      BIN_EVAL_ALLOW_PUBLIC_BIND: "true"
      BIN_EVAL_GIT_SHA: ${BIN_EVAL_GIT_SHA:-local}
    ports:
      - "127.0.0.1:${BIN_EVAL_API_PORT:-18080}:8080"

  worker:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    entrypoint: ["/bin-eval-worker"]
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      garage:
        condition: service_started
    environment: *bin_eval_app_environment

  llm-fixture:
    profiles: ["deterministic"]
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile
    entrypoint: ["/bin-eval-llm-fixture"]

  public-gateway:
    profiles: ["public"]
    image: nginx:1.28.2-alpine
    network_mode: host
    restart: unless-stopped
    environment:
      NGINX_ENVSUBST_FILTER: ^BIN_EVAL_PUBLIC_(BEARER_TOKEN|GATEWAY_PORT|BACKEND_URL)$$
      BIN_EVAL_PUBLIC_BEARER_TOKEN: ${BIN_EVAL_PUBLIC_BEARER_TOKEN:-}
      BIN_EVAL_PUBLIC_GATEWAY_PORT: ${BIN_EVAL_PUBLIC_GATEWAY_PORT:-18081}
      BIN_EVAL_PUBLIC_BACKEND_URL: ${BIN_EVAL_PUBLIC_BACKEND_URL:-http://127.0.0.1:8080}
    volumes:
      - ./nginx-public.conf.template:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:$${BIN_EVAL_PUBLIC_GATEWAY_PORT}/healthz"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 2s

volumes:
  postgres-data:
  garage-meta:
  garage-data:
