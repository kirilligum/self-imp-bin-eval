services:
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_USER: ${BIN_EVAL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${BIN_EVAL_POSTGRES_PASSWORD}
      POSTGRES_DB: ${BIN_EVAL_POSTGRES_DB}
    ports:
      - "127.0.0.1:${BIN_EVAL_POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BIN_EVAL_POSTGRES_USER} -d ${BIN_EVAL_POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.28.4
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${BIN_EVAL_POSTGRES_USER}
      POSTGRES_PWD: ${BIN_EVAL_POSTGRES_PASSWORD}
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
    ports:
      - "127.0.0.1:7233:7233"

  garage:
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    environment:
      GARAGE_CONFIG_FILE: /etc/garage.toml
      GARAGE_DEFAULT_ACCESS_KEY: ${BIN_EVAL_GARAGE_ACCESS_KEY}
      GARAGE_DEFAULT_SECRET_KEY: ${BIN_EVAL_GARAGE_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET: ${BIN_EVAL_ARTIFACT_BUCKET}
    ports:
      - "127.0.0.1:3900:3900"
      - "127.0.0.1:3901:3901"
      - "127.0.0.1:3902:3902"
      - "127.0.0.1:3903:3903"
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data

volumes:
  postgres-data:
  garage-meta:
  garage-data:

