tests:
  - id: TEST-001
    name: LLM schemas and local runtime contract
    reqs: [REQ-020, REQ-044]
    level: static-unit
    files:
      - internal/llm/schema_test.go
      - scripts/validate_local_runtime_contract.sh
    command: make lint && go test ./internal/llm -run TestRubricRefinementSchemasAndPrompts -count=1
    evidence: test output plus static script output

  - id: TEST-002
    name: Evalcore checklist assembly and validation
    reqs: [REQ-002, REQ-003, REQ-004, REQ-008, REQ-009]
    level: unit
    files:
      - internal/evalcore/ids_test.go
      - internal/evalcore/score_test.go
      - internal/evalcore/validate_test.go
      - scripts/validate_litellm_responses.sh
    command: go test ./internal/evalcore -count=1
    evidence: unit test output

  - id: TEST-003
    name: Local systemd install dry-run contract
    reqs: [REQ-044]
    level: static
    files:
      - scripts/install-local-systemd.sh
    command: scripts/install-local-systemd.sh --dry-run
    evidence: dry-run output

  - id: TEST-004
    name: Local status command contract
    reqs: [REQ-044]
    level: static
    files:
      - scripts/status-local.sh
    command: scripts/status-local.sh --json
    evidence: status JSON

  - id: TEST-005
    name: Live curl workflow
    reqs: [REQ-001, REQ-006, REQ-010, REQ-021]
    level: live-e2e
    files:
      - scripts/live_curl_example.sh
    command: make test-live-curl
    evidence: debug/live-curl captures

  - id: TEST-007
    name: LLM HTTP client and curl documentation contract
    reqs: [REQ-020, REQ-021, REQ-040, REQ-041]
    level: unit-static
    files:
      - internal/llm/client_test.go
      - scripts/validate_docs_curl.sh
    command: go test ./internal/llm -run TestGenerateJSONClient -count=1 && scripts/validate_docs_curl.sh
    evidence: unit test output plus docs validator output

  - id: TEST-008
    name: LLM activity payloads and artifact writes
    reqs: [REQ-007, REQ-011, REQ-020, REQ-040]
    level: unit
    files:
      - internal/activities/llm_test.go
    command: go test ./internal/activities -run TestLLMActivities -count=1
    evidence: unit test output

  - id: TEST-009
    name: Config and logging redaction
    reqs: [REQ-041, REQ-042]
    level: unit
    files:
      - internal/config/config_test.go
      - internal/observability/log_test.go
    command: go test ./internal/config ./internal/observability -count=1
    evidence: unit test output

  - id: TEST-010
    name: Postgres checklist and evaluation persistence
    reqs: [REQ-005, REQ-030, REQ-032]
    level: integration
    files:
      - internal/db/db_integration_test.go
    command: make test-integration
    evidence: integration test output

  - id: TEST-011
    name: Garage artifact persistence
    reqs: [REQ-011, REQ-031, REQ-041]
    level: integration
    files:
      - internal/artifacts/artifacts_integration_test.go
    command: make test-integration
    evidence: integration test output

  - id: TEST-012
    name: Temporal create/evaluate success workflows
    reqs: [REQ-001, REQ-006, REQ-012]
    level: unit
    files:
      - internal/workflows/create_checklist_test.go
      - internal/workflows/evaluate_answer_test.go
    command: go test ./internal/workflows -run TestCreateChecklistWorkflow -count=1
    evidence: unit test output

  - id: TEST-013
    name: HTTP API route and response contracts
    reqs: [REQ-001, REQ-006, REQ-010, REQ-021, REQ-032]
    level: unit
    files:
      - internal/api/api_test.go
    command: go test ./internal/api -count=1
    evidence: unit test output

  - id: TEST-018
    name: Temporal retry classification
    reqs: [REQ-040]
    level: unit
    files:
      - internal/activities/retry_test.go
    command: go test ./internal/activities -run TestRetryClassification -count=1
    evidence: unit test output

  - id: TEST-019
    name: Workflow failure persistence
    reqs: [REQ-001, REQ-006, REQ-012, REQ-040]
    level: unit
    files:
      - internal/workflows/create_checklist_test.go
      - internal/workflows/evaluate_answer_test.go
    command: go test ./internal/workflows -run 'Failure|Rejects|Invalid|Activity' -count=1
    evidence: unit test output

  - id: TEST-020
    name: Postgres terminal and constraint invariants
    reqs: [REQ-005, REQ-030, REQ-032]
    level: integration
    files:
      - internal/db/db_integration_test.go
    command: make test-integration
    evidence: integration test output

  - id: TEST-021
    name: Traceability matrix validation
    reqs: [REQ-044]
    level: static
    files:
      - docs/test-matrix.yml
      - scripts/validate_traceability.sh
    command: scripts/validate_traceability.sh
    evidence: traceability validation output

  - id: TEST-022
    name: Smoke capture invariant audit
    reqs: [REQ-009, REQ-010, REQ-013, REQ-014]
    level: e2e-audit
    files:
      - scripts/validate_smoke_invariants.sh
    command: make test-e2e
