name: ci

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deterministic:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Static and unit gates
        run: make lint && make build && make test && make test-race
      - name: Persistence integration gate
        run: make test-integration
      - name: Start deterministic full stack
        env:
          BIN_EVAL_LLM_BASE_URL: http://llm-fixture:4000
          BIN_EVAL_LLM_API_KEY: deterministic-fixture
          BIN_EVAL_MODEL_PROFILE: deterministic-fixture
          BIN_EVAL_GIT_SHA: ${{ github.sha }}
        run: docker compose --env-file deploy/compose/.env.example -f deploy/compose/docker-compose.yml --profile app --profile deterministic up -d --build
      - name: Curl full-stack evaluation
        env:
          BIN_EVAL_LLM_BASE_URL: http://llm-fixture:4000
          BIN_EVAL_EXTERNAL_STACK: "true"
          BIN_EVAL_URL: http://127.0.0.1:18080
          BIN_EVAL_MODEL_PROFILE: deterministic-fixture
          BIN_EVAL_ENDPOINT_CLASS: deterministic
          BIN_EVAL_FIXTURE_VERSION: v2
          BIN_EVAL_GIT_SHA: ${{ github.sha }}
        run: make test-e2e
      - name: Capture container logs
        if: always()
        run: mkdir -p debug && docker compose --env-file deploy/compose/.env.example -f deploy/compose/docker-compose.yml --profile app --profile deterministic logs --no-color > debug/compose.log
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: deterministic-${{ github.sha }}
          path: debug/

  live:
    if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    needs: deterministic
    runs-on: [self-hosted, linux, x64, bin-eval-live]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - name: Require live LLM configuration
        env:
          BIN_EVAL_LLM_BASE_URL: ${{ secrets.BIN_EVAL_LLM_BASE_URL }}
          BIN_EVAL_LLM_API_KEY: ${{ secrets.BIN_EVAL_LLM_API_KEY }}
          BIN_EVAL_LLM_CONTAINER: ${{ vars.BIN_EVAL_LLM_CONTAINER }}
        run: test -n "$BIN_EVAL_LLM_BASE_URL" && test -n "$BIN_EVAL_LLM_API_KEY" && test -n "$BIN_EVAL_LLM_CONTAINER"
      - name: Attach private LiteLLM endpoint
        env:
          BIN_EVAL_LLM_CONTAINER: ${{ vars.BIN_EVAL_LLM_CONTAINER }}
        run: |
          docker compose --env-file deploy/compose/.env.example -f deploy/compose/docker-compose.yml up -d postgres temporal garage
          network="$(docker network ls --filter label=com.docker.compose.project=compose --filter label=com.docker.compose.network=default --format '{{.Name}}')"
          test -n "$network"
          if ! docker inspect "$BIN_EVAL_LLM_CONTAINER" --format '{{json .NetworkSettings.Networks}}' | jq -e --arg network "$network" 'has($network)' >/dev/null; then
            docker network connect --alias bin-eval-litellm "$network" "$BIN_EVAL_LLM_CONTAINER"
          fi
      - name: Start live full stack
        env:
          BIN_EVAL_LLM_BASE_URL: ${{ secrets.BIN_EVAL_LLM_BASE_URL }}
          BIN_EVAL_LLM_API_KEY: ${{ secrets.BIN_EVAL_LLM_API_KEY }}
          BIN_EVAL_MODEL_PROFILE: ${{ vars.BIN_EVAL_MODEL_PROFILE }}
          BIN_EVAL_GIT_SHA: ${{ github.sha }}
        run: docker compose --env-file deploy/compose/.env.example -f deploy/compose/docker-compose.yml --profile app up -d --build
      - name: Curl live full-stack evaluation
        env:
          BIN_EVAL_LLM_BASE_URL: ${{ secrets.BIN_EVAL_LLM_BASE_URL }}
          BIN_EVAL_EXTERNAL_STACK: "true"
          BIN_EVAL_URL: http://127.0.0.1:18080
          BIN_EVAL_MODEL_PROFILE: ${{ vars.BIN_EVAL_MODEL_PROFILE || 'gpt-5.4-mini' }}
          BIN_EVAL_ENDPOINT_CLASS: live
          BIN_EVAL_FIXTURE_VERSION: not-applicable
          BIN_EVAL_GIT_SHA: ${{ github.sha }}
        run: make test-e2e
      - name: Capture container logs
        if: always()
        run: mkdir -p debug && docker compose --env-file deploy/compose/.env.example -f deploy/compose/docker-compose.yml --profile app logs --no-color > debug/compose.log
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: live-${{ github.sha }}
          path: debug/
      - name: Stop live app containers
        if: always()
        run: docker compose --env-file deploy/compose/.env.example -f deploy/compose/docker-compose.yml --profile app stop api worker && docker compose --env-file deploy/compose/.env.example -f deploy/compose/docker-compose.yml --profile app rm -f api worker
